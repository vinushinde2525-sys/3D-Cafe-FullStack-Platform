<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0F0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="450" fill="url(#bg)" rx="0"/>
  <!-- Subtle texture circles -->
  <circle cx="50" cy="50" r="80" fill="white" opacity="0.04"/>
  <circle cx="550" cy="400" r="120" fill="white" opacity="0.04"/>
  <circle cx="300" cy="440" r="160" fill="white" opacity="0.03"/>
  <!-- Plate/bowl shape -->
  <ellipse cx="300" cy="260" rx="180" ry="140" fill="url(#plate)" stroke="white" stroke-width="1.5" stroke-opacity="0.2"/>
  <ellipse cx="300" cy="260" rx="160" ry="122" fill="white" opacity="0.08"/>
  <!-- Food emoji -->
  <text x="300" y="290" font-size="100" text-anchor="middle" dominant-baseline="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">🧊</text>
  <!-- Title band -->
  <rect x="0" y="370" width="600" height="80" fill="black" opacity="0.35"/>
  <text x="300" y="402" font-size="22" font-weight="700" text-anchor="middle" fill="white" font-family="Georgia,serif" letter-spacing="1">Cold Brew Float</text>
  <text x="300" y="428" font-size="13" text-anchor="middle" fill="white" font-family="Arial,sans-serif" opacity="0.7" letter-spacing="2">CAFÉ 3D</text>
</svg>