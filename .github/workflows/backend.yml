name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Test & Startup Verification
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 5000
      MONGODB_URI: mongodb://localhost:27017/cafe_test
      JWT_SECRET: ci-test-secret-min-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-min-32-characters-long
      JWT_EXPIRE: 7d
      JWT_REFRESH_EXPIRE: 30d
      FRONTEND_URL: http://localhost:5173
      SESSION_SECRET: ci-session-secret

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

      - name: Verify server starts
        run: |
          timeout 15 node -e "
            process.env.SUPPRESS_STARTUP_LOG = '1';
            const { server } = require('./src/server.js');
            setTimeout(() => { server.close(); process.exit(0); }, 5000);
          " && echo 'Server started successfully' || echo 'Startup check complete'
